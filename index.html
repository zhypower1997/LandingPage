<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LandingPage Projects</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fff7ed;
      --ink: #1f130e;
      --muted: #705f54;
      --card: #fffefd;
      --line: rgba(31, 19, 14, .12);
      --orange: #f47c00;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 12%, rgba(244, 124, 0, .18), transparent 28%),
        linear-gradient(180deg, var(--bg), #fffefd);
      display: grid;
      place-items: center;
      padding: 32px;
    }

    main { width: min(920px, 100%); }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(36px, 6vw, 72px);
      line-height: .95;
      letter-spacing: -.055em;
    }

    p {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.55;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    a {
      display: block;
      min-height: 220px;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 28px;
      color: inherit;
      text-decoration: none;
      background: var(--card);
      box-shadow: 0 24px 70px rgba(74, 38, 15, .12);
      transition: transform .18s ease, box-shadow .18s ease;
    }

    a:hover {
      transform: translateY(-4px);
      box-shadow: 0 32px 90px rgba(74, 38, 15, .18);
    }

    strong {
      display: block;
      margin-bottom: 14px;
      color: var(--orange);
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.05;
      letter-spacing: -.04em;
    }

    span {
      color: var(--muted);
      line-height: 1.5;
    }

    @media (max-width: 720px) {
      body { padding: 18px; }
      .grid { grid-template-columns: 1fr; }
      a { min-height: 180px; }
    }
  </style>
</head>
<body>
  <main>
    <h1>LandingPage Projects</h1>
    <p>一个仓库管理多个静态落地页。Vercel 部署时为每个项目选择对应 Root Directory。</p>
    <div class="grid">
      <a href="sites/saboriza-opc/">
        <strong>Landing Page</strong>
        <h2>Saboriza OPC</h2>
        <span>葡语餐饮 AI 修图落地页，适合单独部署到 Vercel。</span>
      </a>
      <a href="sites/studio-ia-product-demo-cn/">
        <strong>Product Demo</strong>
        <h2>智能餐图工坊</h2>
        <span>中文产品原型演示页面，适合内部展示和产品沟通。</span>
      </a>
    </div>
  </main>
</body>
</html>
