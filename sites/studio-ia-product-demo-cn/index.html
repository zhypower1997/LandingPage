<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>智能餐图工坊产品原型</title>
  <style>
    :root {
      color-scheme: light;
      --orange: #f47c00;
      --orange-2: #ff9340;
      --navy: #8a4a00;
      --bg: #f7f7f8;
      --panel: #f7f7f8;
      --panel-2: #fff;
      --text: #12101a;
      --muted: #74717d;
      --line: rgba(18, 16, 26, .1);
      --line-strong: rgba(18, 16, 26, .18);
      --brand: #f47c00;
      --brand-2: #8a4a00;
      --brand-soft: #fff2df;
      --ink: #12101a;
      --good: #20a66b;
      --good-soft: #e7f7ef;
      --warn: #b96500;
      --warn-soft: #fff2df;
      --bad: #f13d3d;
      --bad-soft: #ffe8e8;
      --shadow: 0 28px 70px rgba(67, 37, 11, .16);
      --radius: 24px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at 14% 20%, rgba(255,255,255,.18), transparent 22%),
        linear-gradient(135deg, #ff9340, #f47c00 58%, #ed6d00);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      opacity: .16;
      background-image:
        radial-gradient(ellipse at center, transparent 0 38%, rgba(80, 35, 0, .72) 39% 43%, transparent 44%),
        radial-gradient(circle at 32% 36%, rgba(80,35,0,.72) 0 4%, transparent 5%);
      background-size: 310px 170px;
      background-position: -40px 10px, 30px 50px;
      transform: rotate(-10deg) scale(1.1);
      pointer-events: none;
    }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .56; }
    .app {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      width: min(1500px, calc(100% - 44px));
      min-height: calc(100vh - 64px);
      margin: 32px auto;
      border-radius: 42px;
      background: var(--bg);
      box-shadow: 0 42px 120px rgba(88, 40, 0, .32);
      overflow: hidden;
      position: relative;
    }
    .app::after {
      content: "";
      position: absolute;
      right: -220px;
      top: 90px;
      width: 620px;
      height: 620px;
      border-radius: 50%;
      background: rgba(255,255,255,.78);
      box-shadow: inset 0 0 0 1px rgba(18,16,26,.04);
      pointer-events: none;
    }
    .sidebar {
      position: sticky;
      top: 0;
      height: calc(100vh - 64px);
      min-height: 760px;
      padding: 24px 18px;
      border-right: 1px solid var(--line);
      background: #fff;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 18px;
      z-index: 1;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
    }
    .logo {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 32% 30%, #fff 0 10%, transparent 11%),
        linear-gradient(135deg, var(--orange-2), var(--orange));
      box-shadow: 0 16px 32px rgba(244, 124, 0, .32);
      flex: 0 0 auto;
    }
    .brand h1 {
      font-size: 16px;
      line-height: 1.15;
      margin: 0;
      letter-spacing: 0;
      font-weight: 700;
    }
    .brand span { color: var(--muted); font-size: 12px; }
    .account-card {
      border: 1px solid var(--line);
      background: var(--panel-2);
      border-radius: 26px;
      padding: 16px;
      display: grid;
      gap: 10px;
      box-shadow: 0 18px 46px rgba(18,16,26,.08);
    }
    .credit-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .credit-count {
      font-size: 34px;
      font-weight: 950;
      color: var(--navy);
      line-height: 1;
    }
    .nav {
      display: grid;
      gap: 4px;
      align-content: start;
    }
    .nav button {
      border: 0;
      background: transparent;
      color: var(--muted);
      display: flex;
      gap: 10px;
      align-items: center;
      width: 100%;
      padding: 12px 14px;
      border-radius: 999px;
      text-align: left;
      font-weight: 850;
    }
    .nav button:hover { background: var(--brand-soft); color: var(--navy); }
    .nav button.active {
      background: #fff2df;
      color: var(--brand-2);
      font-weight: 950;
      box-shadow: 0 14px 30px rgba(244,124,0,.18);
    }
    .side-help {
      border-radius: 26px;
      background: linear-gradient(135deg, #ffb15f, var(--orange));
      color: #fff;
      padding: 18px;
      box-shadow: 0 18px 36px rgba(244,124,0,.26);
    }
    .side-help p { margin: 4px 0 14px; color: rgba(255,255,255,.72); font-size: 13px; }
    .main-wrap {
      min-width: 0;
      padding: 28px;
      position: relative;
      z-index: 1;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 22px;
    }
    .topbar h2 {
      margin: 0;
      font-size: 34px;
      letter-spacing: 0;
      font-weight: 950;
      color: var(--navy);
    }
    .topbar p { margin: 4px 0 0; color: var(--muted); }
    .top-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
    .btn {
      border: 0;
      background: var(--panel-2);
      color: var(--text);
      min-height: 46px;
      padding: 0 20px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      font-weight: 950;
      box-shadow: 0 16px 38px rgba(18,16,26,.1);
      white-space: nowrap;
    }
    .btn:hover:not(:disabled) { color: var(--navy); transform: translateY(-1px); }
    .btn.primary {
      background: #fff2df;
      color: var(--brand-2);
      box-shadow: 0 18px 36px rgba(244,124,0,.2);
    }
    .btn.primary:hover:not(:disabled) { background: #ffe3bd; color: var(--brand-2); }
    .btn.ghost {
      background: transparent;
      box-shadow: none;
    }
    .btn.danger {
      background: var(--bad-soft);
      color: var(--bad);
    }
    .layout {
      display: grid;
      gap: 14px;
    }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .card {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: var(--radius);
      box-shadow: 0 18px 46px rgba(18,16,26,.08);
      padding: 22px;
    }
    .card.tight { padding: 12px; }
    .card h3 {
      margin: 0 0 6px;
      font-size: 18px;
      color: var(--navy);
      font-weight: 950;
    }
    .card p { color: var(--muted); margin: 4px 0 0; }
    .stat {
      display: grid;
      gap: 8px;
    }
    .stat-value {
      font-size: 42px;
      font-weight: 950;
      color: var(--navy);
      line-height: 1;
    }
    .muted { color: var(--muted); }
    .small { font-size: 12px; color: var(--muted); }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
      border-radius: 999px;
      padding: 7px 11px;
      background: var(--brand-soft);
      color: var(--orange);
      font-size: 12px;
      font-weight: 950;
    }
    .badge.good { background: var(--good-soft); color: var(--good); }
    .badge.warn { background: var(--warn-soft); color: var(--warn); }
    .badge.bad { background: var(--bad-soft); color: var(--bad); }
    .upload-shell {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(360px, .95fr);
      gap: 18px;
      align-items: start;
    }
    .dropzone {
      border: 2px dashed var(--line-strong);
      background:
        radial-gradient(circle at 50% 42%, rgba(244,124,0,.14) 0 15%, transparent 16%),
        linear-gradient(135deg, #fff, #fff2df);
      border-radius: 28px;
      min-height: 300px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }
    .dropzone.dragover {
      border-color: var(--brand);
      background: var(--brand-soft);
    }
    .file-input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .preview-frame {
      min-height: 300px;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at 50% 42%, rgba(244,124,0,.18) 0 14%, transparent 15%),
        linear-gradient(135deg, #fff, #fff2df);
      display: grid;
      place-items: center;
      position: relative;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.7);
    }
    .preview-frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      max-height: 430px;
      display: block;
      background: rgba(255,255,255,.45);
    }
    .batch-list {
      display: grid;
      gap: 10px;
    }
    .batch-item {
      display: grid;
      grid-template-columns: 52px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 18px;
      padding: 10px;
      box-shadow: 0 12px 28px rgba(18,16,26,.06);
    }
    .batch-thumb {
      width: 52px;
      height: 52px;
      border-radius: 15px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 42%, rgba(244,124,0,.18) 0 16%, transparent 17%),
        linear-gradient(135deg, #fff, #fff2df);
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
    }
    .batch-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .batch-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
    }
    .preview-empty {
      text-align: center;
      color: var(--muted);
      padding: 20px;
    }
    .segmented {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      border: 1px solid var(--line);
      background: #fff2df;
      border-radius: 999px;
      padding: 6px;
      gap: 4px;
    }
    .segmented button {
      border: 0;
      background: transparent;
      border-radius: 999px;
      padding: 12px;
      color: var(--muted);
      font-weight: 950;
    }
    .segmented button.active {
      background: var(--panel-2);
      color: var(--navy);
      box-shadow: 0 14px 32px rgba(18,16,26,.1);
    }
    .option {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 14px;
      background: #fff;
      display: grid;
      gap: 4px;
      min-height: 78px;
      text-align: left;
      font-weight: 850;
    }
    .option:hover { border-color: var(--brand); }
    .option.active {
      border-color: var(--brand);
      background: var(--brand-soft);
      color: var(--navy);
    }
    .field { display: grid; gap: 6px; }
    .field label { font-weight: 700; }
    textarea, input, select {
      border: 1px solid var(--line-strong);
      border-radius: 18px;
      background: white;
      color: var(--text);
      padding: 12px 14px;
      min-height: 48px;
      width: 100%;
      outline: 0;
    }
    textarea { min-height: 92px; resize: vertical; }
    .validation {
      border-radius: 20px;
      padding: 13px 15px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.6);
    }
    .validation.bad { background: var(--bad-soft); border-color: rgba(180,35,24,.35); color: var(--bad); }
    .validation.good { background: var(--good-soft); border-color: rgba(17,132,91,.24); color: var(--good); }
    .validation.warn { background: var(--warn-soft); border-color: rgba(161,92,0,.24); color: var(--warn); }
    .progress-card {
      display: grid;
      gap: 12px;
    }
    .progress-track {
      height: 12px;
      background: #fff2df;
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--orange), var(--orange-2));
      border-radius: inherit;
      transition: width .25s ease;
    }
    .steps {
      display: grid;
      gap: 8px;
    }
    .step {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr);
      gap: 8px;
      color: var(--muted);
      align-items: start;
    }
    .step-num {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      display: inline-grid;
      place-items: center;
      background: #fff2df;
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
    }
    .step.done { color: var(--good); }
    .step.active { color: var(--navy); font-weight: 950; }
    .step.done .step-num { background: var(--good-soft); color: var(--good); }
    .step.active .step-num { background: #fff2df; color: var(--brand-2); }
    .compare {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 30px;
      min-height: 360px;
      background: var(--panel-2);
      box-shadow: 0 18px 46px rgba(18,16,26,.08);
    }
    .compare-pane {
      display: grid;
      place-items: end center;
      padding: 12px;
      background:
        radial-gradient(circle at 52% 42%, rgba(70,50,30,.11) 0 14%, transparent 15%),
        linear-gradient(135deg, #fff, #fff2df);
      position: relative;
    }
    .compare-pane.after {
      border-left: 1px solid var(--line);
      background:
        radial-gradient(circle at 50% 39%, rgba(244,124,0,.24) 0 18%, transparent 19%),
        linear-gradient(135deg, #fff2df, #fff);
    }
    .compare-pane img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 14px;
    }
    .compare .chip {
      z-index: 1;
      background: rgba(255,255,255,.9);
      border: 1px solid var(--line);
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 950;
    }
    .result-hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 30px;
      background: linear-gradient(135deg, #fff2df, #fff);
      padding: 18px;
      box-shadow: 0 18px 46px rgba(18,16,26,.08);
    }
    .result-hero strong {
      display: block;
      font-size: 18px;
      margin-bottom: 4px;
    }
    .result-hero p {
      margin: 0;
      color: var(--muted);
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 18px;
    }
    .photo-card {
      border: 1px solid var(--line);
      border-radius: 28px;
      background: #fff;
      overflow: hidden;
      display: grid;
      box-shadow: 0 18px 46px rgba(18,16,26,.08);
    }
    .photo-img {
      height: 210px;
      background:
        radial-gradient(circle at 50% 42%, rgba(244,124,0,.22) 0 15%, transparent 16%),
        linear-gradient(135deg, #fff, #fff2df);
      display: grid;
      place-items: center;
      position: relative;
    }
    .photo-img img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 8px;
    }
    .photo-body {
      padding: 16px;
      display: grid;
      gap: 10px;
    }
    .photo-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .photo-actions .btn {
      min-width: 0;
      padding-inline: 8px;
    }
    .photo-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .toast-area {
      position: fixed;
      right: 16px;
      bottom: 16px;
      display: grid;
      gap: 8px;
      z-index: 20;
      max-width: min(360px, calc(100vw - 32px));
    }
    .toast {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.94);
      box-shadow: var(--shadow);
      border-radius: 22px;
      padding: 14px;
      display: grid;
      gap: 4px;
    }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(18,31,85,.48);
      display: none;
      place-items: center;
      padding: 18px;
      z-index: 10;
    }
    .modal-backdrop.open { display: grid; }
    .modal {
      width: min(920px, 100%);
      max-height: min(880px, 92vh);
      overflow: auto;
      background: var(--panel);
      border-radius: 34px;
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
      padding: 22px;
      display: grid;
      gap: 14px;
    }
    .empty {
      min-height: 300px;
      display: grid;
      place-items: center;
      text-align: center;
      border: 1px dashed var(--line-strong);
      border-radius: 30px;
      background: #fff;
      padding: 20px;
    }
    .mobile-menu { display: none; }
    .hidden { display: none !important; }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
        width: min(100% - 24px, 1500px);
        margin: 12px auto;
        border-radius: 32px;
      }
      .sidebar {
        position: static;
        height: auto;
        min-height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
        grid-template-rows: auto;
      }
      .nav {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .side-help { display: none; }
      .upload-shell, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .app {
        width: min(100% - 12px, 1500px);
        border-radius: 26px;
      }
      .main-wrap { padding: 14px; }
      .topbar, .head-row { align-items: stretch; }
      .top-actions { justify-content: flex-start; }
      .grid-2, .compare, .result-hero { grid-template-columns: 1fr; }
      .grid-2, .compare { display: grid; }
      .photo-actions { grid-template-columns: 1fr; }
      .nav { grid-template-columns: 1fr 1fr; }
      .compare-pane.after { border-left: 0; border-top: 1px solid var(--line); }
      .topbar h2 { font-size: 28px; }
      .btn { min-height: 44px; padding: 0 16px; }
      .segmented { border-radius: 22px; grid-template-columns: 1fr; }
      .segmented button { border-radius: 18px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <h1>智能餐图工坊</h1>
          <span>照片生成工作台原型</span>
        </div>
      </div>
      <div class="account-card">
        <div class="credit-line">
          <div>
            <div class="small">可用积分</div>
            <div class="credit-count" data-credit-count>18</div>
          </div>
          <span class="badge good">已登录</span>
        </div>
        <button class="btn primary" data-nav="upload">生成新照片</button>
      </div>
      <nav class="nav" aria-label="主导航">
        <button data-nav="dashboard" class="active">首页概览</button>
        <button data-nav="upload">生成照片</button>
        <button data-nav="gallery">照片库</button>
        <button data-nav="plan">购买积分</button>
        <button data-nav="history">操作历史</button>
        <button data-nav="settings">账号设置</button>
      </nav>
      <div class="side-help">
        <strong>推荐流程</strong>
        <p>先用 1:1 菜单图测试一个菜品，满意后复用配置批量生成。</p>
        <button class="btn" data-nav="upload">开始配置</button>
      </div>
    </aside>

    <main class="main-wrap">
      <div class="topbar">
        <div>
          <h2 data-page-title>首页概览</h2>
          <p data-page-subtitle>查看积分、最近作品和生成状态。</p>
        </div>
        <div class="top-actions">
          <button class="btn" data-action="simulate-low-credit">模拟低积分</button>
          <button class="btn" data-action="reset-demo">重置演示</button>
        </div>
      </div>
      <section id="view"></section>
    </main>
  </div>

  <div class="modal-backdrop" id="result-modal" role="dialog" aria-modal="true" aria-labelledby="result-title">
    <div class="modal">
      <div class="topbar" style="margin:0">
        <div>
          <h2 id="result-title">生成结果</h2>
          <p>对比原图和优化后的 mock 结果。</p>
        </div>
        <button class="btn ghost" data-action="close-modal">关闭</button>
      </div>
      <div id="result-content"></div>
    </div>
  </div>

  <div class="toast-area" id="toast-area" aria-live="polite"></div>

  <script>
    const initialState = () => ({
      page: 'dashboard',
      credits: 18,
      plan: '餐饮专业版',
      user: 'demo@studioia.local',

    function bindUpload() {
      const fileInput = document.getElementById('file-input');
      const dropzone = document.getElementById('dropzone');
      if (fileInput) fileInput.addEventListener('change', event => handleFiles(Array.from(event.target.files || [])));
      if (dropzone) {
        ['dragenter', 'dragover'].forEach(type => dropzone.addEventListener(type, event => {
          event.preventDefault();
          dropzone.classList.add('dragover');
        }));
        ['dragleave', 'drop'].forEach(type => dropzone.addEventListener(type, event => {
          event.preventDefault();
          dropzone.classList.remove('dragover');
        }));
        dropzone.addEventListener('drop', event => handleFiles(Array.from(event.dataTransfer.files || [])));
      }
      document.querySelectorAll('[data-mode]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.mode = btn.dataset.mode;
          state.uploadError = '';
          renderUpload();
        });
      });
      document.querySelectorAll('[data-remove-batch]').forEach(btn => {
        btn.addEventListener('click', event => {
          event.preventDefault();
          event.stopPropagation();
          state.batchFiles = state.batchFiles.filter(item => String(item.id) !== String(btn.dataset.removeBatch));
          renderUpload();
        });
      });
      document.querySelectorAll('[data-option]').forEach(btn => {
        btn.addEventListener('click', () => {
          state[btn.dataset.option] = btn.dataset.value;
          renderUpload();
        });
      });
      const remove = document.getElementById('remove-items');
      const prompt = document.getElementById('prompt');
      const custom = document.getElementById('custom-scene');
      if (remove) remove.addEventListener('input', () => state.removeItems = remove.value);
      if (prompt) prompt.addEventListener('input', () => state.prompt = prompt.value);
      if (custom) custom.addEventListener('input', () => state.customScene = custom.value);
      const generate = document.querySelector('[data-action="generate"]');
      if (generate) generate.addEventListener('click', startGeneration);
      const preset = document.querySelector('[data-action="use-preset"]');
      if (preset) preset.addEventListener('click', useLastPreset);
    }

    function handleFiles(files) {
      state.uploadError = '';
      if (!files.length) return;
      if (state.mode === 'standardize') {
        const accepted = files.slice(0, Math.max(0, 24 - state.batchFiles.length));
        if (files.length > accepted.length) {
          toast('已限制批量数量', '一次队列最多 24 张，超出的图片未加入。', 'bad');
        }
        accepted.forEach(file => readOneFile(file, true));
      } else {
        readOneFile(files[0], false);
      }
    }

    function readOneFile(file, appendToBatch) {
      const validTypes = ['image/jpeg', 'image/png', 'image/webp'];
      if (!validTypes.includes(file.type)) {
        if (!appendToBatch) {
          state.uploadedFile = null;
          state.uploadedPreview = '';
        }
        state.uploadError = '文件格式不支持。请选择 JPG、PNG 或 WEBP。';
        toast('文件不可用', state.uploadError, 'bad');
        renderUpload();
        return;
      }
      if (file.size > 30 * 1024 * 1024) {
        if (!appendToBatch) {
          state.uploadedFile = null;
          state.uploadedPreview = '';
        }
        state.uploadError = '图片超过 30MB。请压缩图片或选择更小的文件。';
        toast('图片太大', state.uploadError, 'bad');
        renderUpload();
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        if (appendToBatch) {
          state.batchFiles.push({
            id: `${Date.now()}-${Math.random().toString(36).slice(2)}`,
            name: file.name,
            size: file.size,
            preview: reader.result
          });
          state.generationMessage = `批量队列已有 ${state.batchFiles.length} 张照片。`;
        } else {
          state.uploadedFile = file;
          state.uploadedPreview = reader.result;
          state.generationMessage = '图片已就绪，可以开始处理。';
        }
        toast('图片已选择', `${file.name} 已载入本地预览。`, 'good');
        renderUpload();
      };
      reader.onerror = () => {
        state.uploadError = '无法读取该图片。请换一张图片重试。';
        renderUpload();
      };
      reader.readAsDataURL(file);
    }

    function startGeneration() {
      if (state.isGenerating) return;
      const isBatch = state.mode === 'standardize';
      const targetCount = isBatch ? state.batchFiles.length : Number(Boolean(state.uploadedFile || state.uploadedPreview));
      if (state.credits <= 0) {
        toast('积分不足', '请先购买积分。', 'bad');
        return;
      }
      if (targetCount <= 0) {
        toast('缺少图片', isBatch ? '请先添加至少一张菜单照片。' : '请先上传原始照片。', 'bad');
        return;
      }
      if (targetCount > state.credits) {
        toast('积分不足', `已选择 ${targetCount} 张照片，但只有 ${state.credits} 个积分。`, 'bad');
        return;
      }
      state.isGenerating = true;
      state.progress = 4;
      state.activeStep = 0;
      state.generationMessage = isBatch ? `正在校验 ${targetCount} 张图片...` : '正在校验图片...';
      const jobId = Date.now();
      state.jobs.unshift({ id: jobId, name: isBatch ? `批量菜单 ${targetCount} 张` : state.uploadedFile?.name || '模拟照片', progress: 4, status: '生成中' });
      renderUpload();
      const stages = isBatch ? [
        [12, 1, '正在统一检查批量图片尺寸和格式...'],
        [26, 2, '正在锁定统一场景、灯光和比例...'],
        [44, 3, `正在逐张识别 ${targetCount} 个菜品主体...`],
        [64, 4, '正在把同一视觉风格套用到整组菜单图...'],
        [86, 5, '正在批量生成和校验结果...'],
        [100, 6, '批量生成成功']
      ] : [
        [14, 1, '正在优化上传图片...'],
        [32, 2, 'AI 正在识别主体和构图...'],
        [50, 3, '正在套用场景、灯光和比例...'],
        [72, 4, '正在生成最终图片...'],
        [90, 5, '正在保存到照片库...'],
        [100, 6, '生成成功']
      ];
      let i = 0;
      clearInterval(generationTimer);
      generationTimer = setInterval(() => {
        const [progress, step, msg] = stages[i];
        state.progress = progress;
        state.activeStep = step;
        state.generationMessage = msg;
        const job = state.jobs.find(j => j.id === jobId);
        if (job) job.progress = progress;
        const bar = document.querySelector('.progress-bar');
        if (bar) bar.style.width = `${progress}%`;
        i += 1;
        if (i >= stages.length) {
          clearInterval(generationTimer);
          finishGeneration(jobId);
        } else {
          const msgNode = document.querySelector('.progress-card p');
          if (msgNode) msgNode.textContent = msg;
          renderUpload();
        }
      }, 720);
    }

    function finishGeneration(jobId) {
      const isBatch = state.mode === 'standardize';
      const sourceItems = isBatch
        ? state.batchFiles
        : [{
          id: jobId,
          name: state.uploadedFile?.name || '新生成照片',
          size: state.uploadedFile?.size || 0,
          preview: state.uploadedPreview
        }];
      const cost = sourceItems.length;
      state.isGenerating = false;
      state.credits = Math.max(0, state.credits - cost);
      state.progress = 100;
      state.activeStep = 6;
      state.generationMessage = isBatch ? `批量生成成功，${cost} 张结果已保存到照片库。` : '生成成功，结果已保存到照片库。';
      const job = state.jobs.find(j => j.id === jobId);
      if (job) job.status = '已完成';
      const photos = sourceItems.map((item, index) => ({
        id: isBatch ? `${jobId}-${index + 1}` : jobId,
        name: item.name?.replace(/\.[^.]+$/, '') || `菜单图 ${index + 1}`,
        scene: state.scene,
        lighting: state.lighting,
        ratio: state.ratio,
        mode: isBatch ? '统一风格' : '单张优化',
        downloaded: false,
        expired: false,
        createdAt: '刚刚',
        prompt: state.prompt,
        preview: item.preview
      }));
      state.gallery = [...photos, ...state.gallery];
      state.history.unshift({
        type: isBatch ? '批量生成' : '生成',
        detail: isBatch ? `统一风格批量生成 ${photos.length} 张，消耗 ${cost} 积分` : `${photos[0].name} 生成成功，消耗 1 积分`,
        time: '刚刚'
      });
      state.selectedPhoto = photos[0];
      if (isBatch) state.batchFiles = [];
      toast(isBatch ? '批量生成成功' : '生成成功', isBatch ? `${photos.length} 张照片已加入照片库。` : '照片已加入照片库。', 'good');
      if (isBatch) openBatchResult(photos);
      else openResult(photos[0]);
      renderUpload();
    }

    function openBatchResult(photos) {
      resultContent.innerHTML = `
        <div class="result-hero">
          <div>
            <strong>统一风格批量处理完成</strong>
            <p>${photos.length} 张菜单照片已按同一套场景、灯光和比例生成，方便直接用于菜单、外卖平台或社媒物料。</p>
          </div>
          <span class="chip">${photos.length} 张结果</span>
        </div>
        <div class="gallery-grid">
          ${photos.map(photo => `
            <article class="photo-card">
              <div class="photo-img">${photo.preview ? `<img src="${photo.preview}" alt="${escapeHtml(photo.name)}">` : ''}<span class="chip">${photo.mode}</span></div>
              <div class="photo-body">
                <h3>${escapeHtml(photo.name)}</h3>
                <p>${photo.scene} · ${photo.lighting} · ${photo.ratio}</p>
                <div class="photo-actions">
                  <button class="btn primary" data-photo-download="${photo.id}">下载</button>
                  <button class="btn" data-photo-view="${photo.id}">查看</button>
                  <button class="btn" data-photo-reuse="${photo.id}">复用</button>
                </div>
              </div>
            </article>
          `).join('')}
        </div>
        <div class="top-actions" style="justify-content:flex-start;margin-top:14px">
          <button class="btn primary" data-batch-download="${photos.map(photo => photo.id).join(',')}">批量下载本次结果</button>
          <button class="btn" data-nav="gallery">去照片库</button>
          <button class="btn ghost" data-nav="upload">继续处理</button>
        </div>
      `;
      modal.classList.add('open');
      bindCommon();
      bindPhotoActions();
    }

    function openResult(photo) {
      resultContent.innerHTML = `
        <div class="compare">
          <div class="compare-pane">${photo.preview ? `<img src="${photo.preview}" alt="原图">` : ''}<span class="chip">原图</span></div>
          <div class="compare-pane after">${photo.preview ? `<img src="${photo.preview}" alt="优化图">` : ''}<span class="chip">优化图预览</span></div>
        </div>
        <div class="grid-2">
          <div class="card"><h3>生成参数</h3><p>${photo.mode} · ${photo.scene} · ${photo.lighting} · ${photo.ratio}</p><p>${escapeHtml(photo.prompt)}</p></div>
          <div class="card"><h3>下一步</h3><p>你可以下载图片，或复用这套参数继续处理下一张。</p><div class="top-actions" style="justify-content:flex-start;margin-top:10px"><button class="btn primary" data-photo-download="${photo.id}">下载</button><button class="btn" data-photo-reuse="${photo.id}">复用配置</button><button class="btn" data-nav="gallery">去照片库</button></div></div>
        </div>
      `;
      modal.classList.add('open');
      bindCommon();
      bindPhotoActions();
    }

    function bindPhotoActions() {
      document.querySelectorAll('[data-photo-view]').forEach(btn => {
        btn.addEventListener('click', () => {
          const photo = findPhoto(btn.dataset.photoView);
          if (photo) openResult(photo);
        });
      });
      document.querySelectorAll('[data-photo-download]').forEach(btn => {
        btn.addEventListener('click', () => {
          const photo = findPhoto(btn.dataset.photoDownload);
          if (!photo) return;
          if (photo.expired) {
            toast('图片已过期', '过期图片不可下载，请重新生成。', 'bad');
            return;
          }
          photo.downloaded = true;
          state.history.unshift({ type: '下载', detail: `${photo.name} 已下载`, time: '刚刚' });
          toast('下载已模拟完成', `${photo.name} 标记为已下载。`, 'good');
          render();
        });
      });
      document.querySelectorAll('[data-photo-reuse]').forEach(btn => {
        btn.addEventListener('click', () => {
          const photo = findPhoto(btn.dataset.photoReuse);
          if (!photo) return;
          state.scene = photo.scene;
          state.lighting = photo.lighting;
          state.ratio = photo.ratio;
          state.mode = photo.mode === '统一风格' ? 'standardize' : 'enhance';
          state.prompt = photo.prompt;
          modal.classList.remove('open');
          toast('配置已复用', '已带入生成页，可继续上传下一张。', 'good');
          setPage('upload');
        });
      });
      document.querySelectorAll('[data-photo-delete]').forEach(btn => {
        btn.addEventListener('click', () => {
          const photo = findPhoto(btn.dataset.photoDelete);
          if (!photo) return;
          state.gallery = state.gallery.filter(p => p.id !== photo.id);
          state.history.unshift({ type: '删除', detail: `${photo.name} 已删除`, time: '刚刚' });
          toast('已删除', `${photo.name} 已从照片库移除。`);
          renderGallery();
        });
      });
      document.querySelectorAll('[data-batch-download]').forEach(btn => {
        btn.addEventListener('click', () => {
          const ids = btn.dataset.batchDownload.split(',').filter(Boolean);
          const photos = ids.map(findPhoto).filter(photo => photo && !photo.expired);
          photos.forEach(photo => photo.downloaded = true);
          state.history.unshift({ type: '下载', detail: `批量下载本次结果 ${photos.length} 张`, time: '刚刚' });
          toast('批量下载完成', `${photos.length} 张本次生成结果已标记为下载。`, 'good');
          render();
        });
      });
      const downloadAll = document.querySelector('[data-action="download-all"]');
      if (downloadAll) {
        downloadAll.addEventListener('click', () => {
          const available = state.gallery.filter(p => !p.expired);
          available.forEach(p => p.downloaded = true);
          state.history.unshift({ type: '下载', detail: `批量下载 ${available.length} 张可用图片`, time: '刚刚' });
          toast('批量下载完成', `${available.length} 张图片已标记为下载。`, 'good');
          renderGallery();
        });
      }
    }

    function bindCommon() {
      document.querySelectorAll('[data-nav]').forEach(btn => {
        btn.addEventListener('click', () => {
          modal.classList.remove('open');
          setPage(btn.dataset.nav);
        });
      });
    }

    function findPhoto(id) {
      return state.gallery.find(photo => String(photo.id) === String(id));
    }

    function useLastPreset() {
      const last = state.gallery.find(photo => !photo.expired);
      if (!last) {
        toast('没有可复用配置', '照片库里还没有可用图片。', 'bad');
        return;
      }
      state.scene = last.scene;
      state.lighting = last.lighting;
      state.ratio = last.ratio;
      state.mode = last.mode === '统一风格' ? 'standardize' : 'enhance';
      state.prompt = last.prompt;
      toast('已套用配置', `来自 ${last.name}。`, 'good');
      renderUpload();
    }

    function formatBytes(bytes) {
      if (!bytes) return '未知大小';
      if (bytes < 1024 * 1024) return `${Math.max(1, Math.round(bytes / 1024))} KB`;
      return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function toast(title, message, type = '') {
      const area = document.getElementById('toast-area');
      const node = document.createElement('div');
      node.className = 'toast';
      node.innerHTML = `<strong>${title}</strong><span class="small">${message}</span>`;
      if (type === 'bad') node.style.borderColor = 'rgba(180,35,24,.45)';
      if (type === 'good') node.style.borderColor = 'rgba(17,132,91,.35)';
      area.appendChild(node);
      setTimeout(() => node.remove(), 3600);
    }

    document.querySelectorAll('[data-nav]').forEach(btn => {
      btn.addEventListener('click', () => setPage(btn.dataset.nav));
    });
    document.querySelector('[data-action="close-modal"]').addEventListener('click', () => modal.classList.remove('open'));
    modal.addEventListener('click', event => {
      if (event.target === modal) modal.classList.remove('open');
    });
    document.querySelector('[data-action="reset-demo"]').addEventListener('click', () => {
      clearInterval(generationTimer);
      state = initialState();
      toast('已重置', '所有 mock 数据已恢复默认。');
      render();
    });
    document.querySelector('[data-action="simulate-low-credit"]').addEventListener('click', () => {
      state.credits = 1;
      toast('已切换低积分状态', '现在可以测试积分不足边界。', 'bad');
      render();
    });

    render();
  </script>
</body>
</html>
