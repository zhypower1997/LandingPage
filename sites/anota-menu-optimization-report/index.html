<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f4f4f1">
  <title>Anota 菜单优化报告</title>
  <style>
    :root {
      --paper: #f4f4f1;
      --card: #ffffff;
      --ink: #171817;
      --muted: #777974;
      --line: #e6e7e2;
      --soft: #f7f7f4;
      --orange: #ff541c;
      --orange-deep: #e7440e;
      --orange-soft: #fff0e9;
      --amber: #b86b00;
      --amber-soft: #fff7e4;
      --green: #267a50;
      --green-soft: #eaf7ef;
      --red: #c53f32;
      --red-soft: #fff0ee;
      --shadow: 0 14px 40px rgba(22, 24, 21, .07);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 15px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 0%, rgba(255, 84, 28, .07), transparent 25rem),
        var(--paper);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    button, input, select { font: inherit; }
    button { color: inherit; }
    a { color: inherit; }
    :focus-visible { outline: 3px solid rgba(255, 84, 28, .35); outline-offset: 3px; }

    .app-shell { width: min(100%, 1040px); margin: 0 auto; min-height: 100vh; }
    .sticky-top {
      position: sticky;
      z-index: 20;
      top: 0;
      padding: max(10px, env(safe-area-inset-top)) 14px 12px;
      background: rgba(244, 244, 241, .88);
      backdrop-filter: blur(18px) saturate(140%);
      border-bottom: 1px solid rgba(218, 219, 214, .72);
    }
    .report-nav { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .brand-lockup { min-width: 0; }
    .eyebrow { margin: 0 0 2px; color: var(--orange-deep); font-size: 11px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }
    .report-title { margin: 0; font-size: 18px; letter-spacing: -.02em; white-space: nowrap; }
    .report-date { color: var(--muted); font-size: 11px; white-space: nowrap; }
    .stage-row { display: flex; gap: 8px; margin-top: 12px; overflow-x: auto; scrollbar-width: none; }
    .stage-row::-webkit-scrollbar, .shop-scroller::-webkit-scrollbar { display: none; }
    .stage {
      padding: 7px 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.7);
      font-size: 12px;
      font-weight: 760;
      white-space: nowrap;
    }
    .stage.active { background: var(--ink); color: #fff; border-color: var(--ink); }
    .shop-scroller { display: flex; gap: 8px; overflow-x: auto; padding-top: 10px; scrollbar-width: none; }
    .shop-chip {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 12px;
      padding: 9px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .18s ease, border-color .18s ease, color .18s ease;
    }
    .shop-chip:hover { transform: translateY(-1px); border-color: #c9cac5; }
    .shop-chip.active { color: #fff; border-color: var(--orange); background: var(--orange); }

    main { padding: 18px 14px calc(56px + env(safe-area-inset-bottom)); }
    .hero {
      position: relative;
      overflow: hidden;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--card);
      box-shadow: var(--shadow);
    }
    .hero::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      right: -74px;
      top: -84px;
      border: 30px solid var(--orange-soft);
      border-radius: 50%;
      pointer-events: none;
    }
    .hero-kicker { display: flex; align-items: center; gap: 7px; color: var(--muted); font-size: 12px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--orange); box-shadow: 0 0 0 5px var(--orange-soft); }
    .hero h2 { position: relative; z-index: 1; margin: 16px 0 7px; max-width: 16ch; font-size: clamp(27px, 7vw, 44px); line-height: 1.04; letter-spacing: -.055em; }
    .hero-summary { position: relative; z-index: 1; margin: 0; max-width: 52ch; color: var(--muted); font-size: 14px; line-height: 1.7; }
    .score-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 22px; }
    .score-cell { padding: 13px 12px; border-radius: 15px; background: var(--soft); }
    .score-cell b { display: block; font-size: 22px; letter-spacing: -.03em; }
    .score-cell span { display: block; margin-top: 2px; color: var(--muted); font-size: 11px; }

    .notice {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-top: 12px;
      padding: 16px;
      border-radius: var(--radius-lg);
      color: #7e2d0f;
      background: linear-gradient(110deg, #fff2eb, #fff8f3);
      border: 1px solid #ffe3d5;
    }
    .notice-mark { display: grid; place-items: center; flex: 0 0 31px; width: 31px; height: 31px; border-radius: 50%; color: white; background: var(--orange); font-weight: 900; }
    .notice strong { display: block; margin-bottom: 3px; font-size: 13px; }
    .notice p { margin: 0; color: #9a563c; font-size: 12px; line-height: 1.55; }

    .section { margin-top: 28px; }
    .section-heading { display: flex; align-items: end; justify-content: space-between; gap: 14px; margin: 0 2px 12px; }
    .section-heading h3 { margin: 0; font-size: 19px; letter-spacing: -.025em; }
    .section-heading p { margin: 4px 0 0; color: var(--muted); font-size: 12px; }
    .count-pill { flex: 0 0 auto; padding: 6px 9px; border-radius: 999px; color: var(--orange-deep); background: var(--orange-soft); font-size: 11px; font-weight: 800; }

    .metric-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .metric-card { padding: 16px; border: 1px solid var(--line); border-radius: var(--radius-lg); background: var(--card); }
    .metric-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .metric-label { font-size: 12px; font-weight: 760; }
    .metric-value { margin-top: 14px; font-size: 27px; font-weight: 850; letter-spacing: -.045em; }
    .metric-help { margin-top: 3px; color: var(--muted); font-size: 11px; }
    .meter { height: 5px; margin-top: 13px; overflow: hidden; border-radius: 99px; background: #ecece8; }
    .meter span { display: block; height: 100%; border-radius: inherit; background: var(--orange); }

    .priority-list { display: grid; gap: 11px; }
    .priority-card { padding: 17px; border: 1px solid var(--line); border-radius: var(--radius-lg); background: var(--card); }
    .priority-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .priority-head h4 { margin: 7px 0 0; font-size: 16px; line-height: 1.35; }
    .tag { display: inline-flex; align-items: center; min-height: 23px; padding: 4px 8px; border-radius: 7px; font-size: 10px; font-weight: 850; }
    .tag.critical { color: var(--red); background: var(--red-soft); }
    .tag.high { color: var(--orange-deep); background: var(--orange-soft); }
    .tag.medium { color: var(--amber); background: var(--amber-soft); }
    .tag.good { color: var(--green); background: var(--green-soft); }
    .priority-index { color: #babcb6; font-size: 12px; font-weight: 800; }
    .priority-reason { margin: 10px 0 0; color: var(--muted); font-size: 12px; line-height: 1.65; }
    .copy-compare { display: grid; gap: 8px; margin-top: 14px; }
    .copy-box { padding: 12px; border-radius: 12px; background: var(--soft); }
    .copy-box.recommended { background: var(--orange-soft); }
    .copy-label { display: block; margin-bottom: 5px; color: var(--muted); font-size: 10px; font-weight: 800; }
    .copy-text { margin: 0; font-size: 12px; line-height: 1.6; }

    .image-plan { display: grid; gap: 10px; }
    .image-card { display: grid; grid-template-columns: 90px minmax(0, 1fr); gap: 13px; padding: 12px; border: 1px solid var(--line); border-radius: var(--radius-lg); background: var(--card); }
    .image-frame { position: relative; width: 90px; aspect-ratio: 1; overflow: hidden; border-radius: 14px; background: #ecece8; }
    .image-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .missing-art { display: grid; place-content: center; width: 100%; height: 100%; color: #a5a69f; text-align: center; background: repeating-linear-gradient(135deg, #f0f0ed 0 8px, #e9e9e5 8px 16px); }
    .missing-art svg { width: 24px; margin: 0 auto 5px; }
    .missing-art span { font-size: 10px; font-weight: 800; }
    .image-body { min-width: 0; padding: 2px 0; }
    .image-body h4 { margin: 5px 0 5px; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .image-body p { margin: 0; color: var(--muted); font-size: 11px; line-height: 1.55; }

    .category-list { display: grid; gap: 10px; }
    details.category { border: 1px solid var(--line); border-radius: var(--radius-lg); background: var(--card); overflow: hidden; }
    details.category[open] { box-shadow: 0 8px 25px rgba(22, 24, 21, .05); }
    .category summary { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 16px; cursor: pointer; list-style: none; font-size: 14px; font-weight: 800; }
    .category summary::-webkit-details-marker { display: none; }
    .category-count { color: var(--muted); font-size: 11px; font-weight: 650; }
    .item-list { border-top: 1px solid var(--line); }
    .menu-item { padding: 14px 16px; }
    .menu-item + .menu-item { border-top: 1px solid var(--line); }
    .item-main { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; }
    .item-name { margin: 0; font-size: 13px; font-weight: 780; line-height: 1.45; }
    .item-desc { margin: 5px 0 0; color: var(--muted); font-size: 11px; line-height: 1.55; }
    .item-price { flex: 0 0 auto; font-size: 12px; font-weight: 850; }
    .flag-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 9px; }
    .flag { padding: 4px 6px; border-radius: 6px; color: #7d5141; background: #fff3ed; font-size: 9px; font-weight: 780; }
    .flag.ok { color: var(--green); background: var(--green-soft); }

    .action-box { padding: 18px; border-radius: var(--radius-xl); color: #fff; background: var(--ink); }
    .action-box h3 { margin: 0 0 13px; font-size: 18px; }
    .checklist { display: grid; gap: 11px; }
    .check { display: grid; grid-template-columns: 24px 1fr; gap: 10px; align-items: start; }
    .check-num { display: grid; place-items: center; width: 24px; height: 24px; border-radius: 8px; color: var(--ink); background: #fff; font-size: 10px; font-weight: 900; }
    .check b { display: block; font-size: 12px; }
    .check span { display: block; margin-top: 2px; color: #bfc1bc; font-size: 11px; line-height: 1.5; }
    .report-foot { margin-top: 28px; color: var(--muted); font-size: 10px; line-height: 1.6; text-align: center; }

    .desktop-grid { display: block; }
    .empty-state { padding: 22px; border: 1px dashed #d6d7d2; border-radius: var(--radius-lg); color: var(--muted); text-align: center; font-size: 12px; }

    @media (min-width: 720px) {
      .sticky-top { padding-inline: 24px; }
      main { padding: 26px 24px 70px; }
      .desktop-grid { display: grid; grid-template-columns: minmax(0, 1.08fr) minmax(0, .92fr); gap: 18px; align-items: start; }
      .desktop-grid .section { margin-top: 28px; }
      .metric-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .priority-list { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .copy-compare { grid-template-columns: 1fr 1fr; }
      .image-plan { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .hero { padding: 30px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; transition: none !important; animation: none !important; }
    }
    @media print {
      .sticky-top { position: static; background: white; }
      .shop-scroller, .stage-row { display: none; }
      body { background: white; }
      main { padding: 10px; }
      .hero, .metric-card, .priority-card, .image-card, details.category { box-shadow: none; break-inside: avoid; }
      details.category > * { display: block; }
    }
  </style>
</head>

      return `<details class="category"><summary><span>${category.category_name}</span><span class="category-count">${category.items.length} 个商品　⌄</span></summary><div class="item-list">${category.items.map(item => {
        const flags = item.diagnostic_features.quality_flags;
        return `<article class="menu-item"><div class="item-main"><div><p class="item-name">${item.item_name}</p><p class="item-desc">${item.description || "暂无商品描述"}</p></div><span class="item-price">${money(item.pricing.current_price)}</span></div><div class="flag-row">${flags.length ? flags.map(flag => `<span class="flag">${FLAG_LABELS[flag] || flag}</span>`).join("") : `<span class="flag ok">基础信息完整</span>`}</div></article>`;
      }).join("")}</div></details>`;
    }

    function renderReport() {
      const store = DATA.stores.find(entry => entry.shop_slug === activeSlug) || DATA.stores[0];
      const guide = SHOP_GUIDANCE[store.shop_slug];
      const items = itemList(store);
      const m = store.diagnostic_metrics;
      const issueItems = items.filter(item => item.diagnostic_features.quality_flags.length > 0);
      const noImageItems = items.filter(item => !realImage(item));
      const statusLabel = store.observed_status === "closed" ? "抓取时已打烊" : "抓取时离线";

      reportEl.innerHTML = `
        <section class="hero">
          <div class="hero-kicker"><span class="status-dot"></span>${statusLabel} · ${store.category_count} 个分类 · ${m.item_count} 个商品</div>
          <h2>${guide.headline}</h2>
          <p class="hero-summary">${guide.summary}</p>
          <div class="score-strip">
            <div class="score-cell"><b>${issueItems.length}</b><span>问题商品</span></div>
            <div class="score-cell"><b>${noImageItems.length}</b><span>待补图片</span></div>
            <div class="score-cell"><b>${guide.priorities.length}</b><span>优先动作</span></div>
          </div>
        </section>

        <aside class="notice"><span class="notice-mark">!</span><div><strong>${guide.label}</strong><p>默认图片已按“无图”处理；有图片 URL 不等于有真实商品图。门店营业状态仅代表抓取时刻。</p></div></aside>

        <section class="section">
          <div class="section-heading"><div><h3>菜单体检</h3><p>四个直接影响浏览与下单的维度</p></div><span class="count-pill">${m.item_count} 个商品</span></div>
          <div class="metric-grid">
            ${metricCard("价格可见", `${pct(m.priced_item_ratio)}%`, `${m.priced_item_count} / ${m.item_count}`, pct(m.priced_item_ratio))}
            ${metricCard("描述覆盖", `${pct(m.described_item_ratio)}%`, `${m.described_item_count} / ${m.item_count}，不代表内容无错配`, pct(m.described_item_ratio))}
            ${metricCard("真实图片", `${pct(m.real_image_item_ratio)}%`, `${m.real_image_item_count} / ${m.item_count}`, pct(m.real_image_item_ratio))}
            ${metricCard("可售商品", `${100 - pct(m.sold_out_item_ratio)}%`, `${m.sold_out_item_count} 个当前售罄`, 100 - pct(m.sold_out_item_ratio))}
          </div>
        </section>

        <section class="section">
          <div class="section-heading"><div><h3>优先修改</h3><p>按对转化和菜单可信度的影响排序</p></div><span class="count-pill">${guide.priorities.length} 项</span></div>
          <div class="priority-list">${guide.priorities.map(renderPriority).join("")}</div>
        </section>

        <section class="section">
          <div class="section-heading"><div><h3>图片优化计划</h3><p>本版不生成图片，只确定图片处理方式</p></div><span class="count-pill">${items.length} 项</span></div>
          <div class="image-plan">${items.map(renderImageCard).join("")}</div>
        </section>

        <div class="desktop-grid">
          <section class="section">
            <div class="section-heading"><div><h3>完整菜单体检</h3><p>展开分类查看每个商品与质量标记</p></div></div>
            <div class="category-list">${store.categories.map(renderCategory).join("")}</div>
          </section>

          <section class="section">
            <div class="action-box"><h3>建议执行顺序</h3><div class="checklist">${guide.checklist.map((item, index) => `<div class="check"><span class="check-num">${index + 1}</span><div><b>${item}</b><span>${index < 2 ? "优先完成，避免后续优化建立在错误菜单上。" : "基础核查完成后进入这一项。"}</span></div></div>`).join("")}</div></div>
            <p class="report-foot">诊断来源：Anota AI 菜单抓取样本 · 51 个商品 / 5 家门店<br>AI 图片在上线前必须与实际份量、配料和出品保持一致。</p>
          </section>
        </div>`;
    }

    window.addEventListener("hashchange", () => {
      activeSlug = location.hash.slice(1) || DATA.stores[0].shop_slug;
      renderSwitcher();
      renderReport();
    });

    renderSwitcher();
    renderReport();
  </script>
</body>
</html>
